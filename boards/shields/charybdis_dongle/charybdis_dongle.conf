## Split keyboards
## https://zmk.dev/docs/config/system#split-keyboards
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ## Track words per minute
# CONFIG_ZMK_WPM=y

## ZMK Studio
## https://zmk.dev/docs/features/studio
CONFIG_ZMK_STUDIO=y
## https://zmk.dev/docs/config/studio
CONFIG_ZMK_STUDIO_LOCKING=y
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=y
CONFIG_ZMK_STUDIO_TRANSPORT_BLE_PREF_LATENCY=5

## Pointing
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

## Display (SSD1306 0.96" 128x64 I2C @ 0x3C no i2c1 / D4-D5 — ver overlay)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

## FIX FINAL (bug-024): profundidade de cor 1bpp explícita. Sem isso o LVGL
## renderiza a 16bpp enquanto o glue mono espera 1bpp — overflow de buffer no
## render → hard fault → CPU halt (o crash que matava o dongle inteiro).
## Delta final vs referência englmaxi/zmk-dongle-display.
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_DPI_DEF=148

## CRÍTICO (bug-024): UI em work queue DEDICADA. No default (system queue),
## o flush I2C do frame bloqueia a fila que serve USB/BLE/teclado — se o bus
## trava, o dongle inteiro congela (nem descriptor USB responde).
## Receita da referência englmaxi/zmk-dongle-display (XIAO + SSD1306).
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_VDB_SIZE=100

## Widgets congelados pós-boot (camada não atualiza em &mo/&lt): o driver
## ssd1306 do Zephyr rejeita flush com y não múltiplo de 8 ("Unsupported
## origin") e o refresh parcial do LVGL manda só o retângulo do label —
## desalinhado → write descartado em silêncio. Render de boot (tela cheia,
## alinhada) funciona, updates não. Full refresh força flush do frame
## inteiro (1KB @ I2C 100kHz ≈ 85ms, ok pra status screen).
CONFIG_LV_Z_FULL_REFRESH=y

## BISECT (bug-024, 2026-07-08): widgets descartados como causa — crash persiste
## com todos =n. Próxima variável: snippet zmk-usb-logging (presente em todos os
## builds que travaram, ausente nas referências funcionais).
